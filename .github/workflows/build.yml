name: Build and Release

on:
  push:
    branches:
      - master
      - dev
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: XlsxSearcher-macos
            exe_name: XlsxSearcher
          - os: windows-latest
            artifact_name: XlsxSearcher-windows
            exe_name: XlsxSearcher.exe
          - os: ubuntu-latest
            artifact_name: XlsxSearcher-linux
            exe_name: XlsxSearcher

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            SEP=";"
            ICON_FILE="icons/app_icon.ico"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            SEP=":"
            ICON_FILE="icons/app_icon.png"
          else
            SEP=":"
            ICON_FILE="icons/app_icon.png"
          fi
          pyinstaller --onefile --windowed --name ${{ matrix.exe_name }} \
            --icon "$ICON_FILE" \
            --add-data "icons/app_icon.png${SEP}icons" \
            main.py

      - name: Create artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            powershell -Command "Compress-Archive -Path ${{ matrix.exe_name }} -DestinationPath ${{ matrix.artifact_name }}.zip -Force"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            # macOS .app is a directory bundle — must use -r and NOT use -j
            zip -ry ${{ matrix.artifact_name }}.zip ${{ matrix.exe_name }}.app
          else
            # Linux single binary
            zip -j ${{ matrix.artifact_name }}.zip ${{ matrix.exe_name }}
          fi
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.zip
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/XlsxSearcher-macos/*.zip
            artifacts/XlsxSearcher-windows/*.zip
            artifacts/XlsxSearcher-linux/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}